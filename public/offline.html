<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>CRUISER Offline</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 24px; color: #f5f5f5; background: radial-gradient(circle at top, #1d290c, #050505 52%); font-family: ui-sans-serif, system-ui, sans-serif; }
      main { width: min(100%, 390px); padding: 32px; border: 1px solid #ffffff1a; border-radius: 32px; background: #0a0a0aeF; text-align: center; }
      img { width: 88px; height: 88px; border-radius: 24px; }
      p { color: #a3a3a3; line-height: 1.6; }
      button { min-height: 48px; width: 100%; border: 0; border-radius: 16px; background: #a3e635; color: #050505; font: inherit; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/cruiser-icon.svg" alt="" />
      <h1>Baglanti bekleniyor</h1>
      <p>CRUISER canli verileri icin internet baglantisi gerekiyor. Baglanti geldiginde tekrar deneyebilirsin.</p>
      <button type="button" onclick="location.reload()">Tekrar Dene</button>
    </main>
  </body>
</html>
